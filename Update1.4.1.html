/* PHONE */

height:700px;
background:rgb(0, 0, 0);
border-radius:46px;
padding:10px;
overflow:hidden;
position:relative;

0 0 120px rgba(0, 0, 0, 0.9),

}

.screen{
width:100%;

url('https://wallpapercg.com/media/ts_orig/33064.webp');

}

/* GLASS */

.liquid{

linear-gradient(
145deg,
rgba(255,255,255,.28),
rgba(255,255,255,.06)
);

border:
1px solid rgba(255,255,255,.18);

backdrop-filter:
blur(60px)
saturate(220%)
contrast(120%);

-webkit-backdrop-filter:
blur(60px)
saturate(220%)
contrast(120%);

box-shadow:
0 8px 45px rgba(0,0,0,.28),
inset 0 1px 1px rgba(255,255,255,.18),
inset 0 -1px 1px rgba(255,255,255,.06);

}

/* =========================
   LOCKSCREEN CLEAN FIX
========================= */

.lockscreen{
position:absolute;
inset:0;
z-index:9999999;

background:
url('https://wallpapercg.com/media/ts_orig/33064.webp')
center/cover no-repeat;

overflow:hidden;
color:white;

transition:
opacity .8s cubic-bezier(.22,1,.36,1),
transform .9s cubic-bezier(.22,1,.36,1);
}

.lockscreen.hide{
opacity:0;
transform:translateY(-100%);
pointer-events:none;
}

.lockscreen.pin-mode::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.18);
backdrop-filter:blur(12px) saturate(160%);
-webkit-backdrop-filter:blur(12px) saturate(160%);
z-index:1;
}

.lockscreen > *{
position:relative;
z-index:2;
}

/* welcome */
.welcomeText{
font-family:'Vito', sans-serif !important;

position:absolute;
top:66px;
left:50%;
transform:translateX(-50%);

font-size:18px;
font-weight:700;

white-space:nowrap;
text-align:center;

color:white;
opacity:.95;

text-shadow:
0 8px 25px rgba(0,0,0,.38);
}

.demoNotice{

),
url('https://wallpapercg.com/media/ts_orig/33064.webp');

background-size:
100% 100%,
340px 700px;

background-position:
center,
center;

screen;

color:transparent;

}

/* TITIK DUA */
.lock-sep{
font-family:'clash', sans-serif !important;

display:inline-block;
position:relative;

font-size:92px;
font-weight:800;

line-height:.9;

transform:
scaleY(1.35);

transform-origin:center center;

margin:0 2px;

background-image:
linear-gradient(
180deg,
rgba(255,255,255,.90) 0%,
rgba(255,255,255,.45) 55%,
rgba(255,255,255,.75) 100%
),
url('https://wallpapercg.com/media/ts_orig/33064.webp');

background-size:
100% 100%,
340px 700px;

background-position:
center,
center;

background-blend-mode:
screen;

color:transparent;
-webkit-text-fill-color:transparent;

background-clip:text;
-webkit-background-clip:text;

opacity:.9;

filter:
drop-shadow(0 12px 22px rgba(0,0,0,.30))
drop-shadow(0 0 12px rgba(255,255,255,.16));

-webkit-text-stroke:
1px rgba(255,255,255,.10);
}

/* SOFT LIQUID HIGHLIGHT */
.lock-char::after,
.lock-sep::after{
content:attr(data-char);

position:absolute;
inset:0;

font-family:'clash', sans-serif !important;

color:rgba(255,255,255,.28);
-webkit-text-fill-color:rgba(255,255,255,.28);

filter:
blur(1.2px);

mix-blend-mode:screen;

transform:
translateY(-2px);

pointer-events:none;
}

/* DEEP GLASS SHADOW */
.lock-char::before,
.lock-sep::before{
content:attr(data-char);

position:absolute;
inset:0;

font-family:'clash', sans-serif !important;

color:rgba(0,0,0,.18);
-webkit-text-fill-color:rgba(0,0,0,.18);

filter:
blur(3px);

transform:
translateY(8px);

z-index:-1;

pointer-events:none;
}

/* pin */
.pinBox{
display:none;

position:absolute;

top:175px;
left:50%;

transform:translateX(-50%);

width:220px;

padding:15px 22px;

border:none;
outline:none;

border-radius:30px;

font-size:18px;

text-align:center;

color:white;

background:
rgba(255,255,255,.14);

backdrop-filter:
blur(30px)
saturate(180%);

-webkit-backdrop-filter:
blur(30px)
saturate(180%);

border:
1px solid rgba(255,255,255,.18);

box-shadow:
0 12px 35px rgba(0,0,0,.25),
inset 0 1px 1px rgba(255,255,255,.18);
}

.pinBox::placeholder{
color:rgba(255,255,255,.75);
}

.lockscreen.pin-mode .pinBox{
display:block;
animation:pinIn .45s cubic-bezier(.22,1,.36,1);
}

/* =========================
   PIN NUMPAD
========================= */

.pinPad{
display:none;

position:absolute;

top:430px;
left:50%;

transform:translateX(-50%);

width:230px;

grid-template-columns:repeat(3,1fr);
gap:12px;

z-index:6;
}

.lockscreen.pin-mode .pinPad{
display:grid;
animation:pinPadIn .45s cubic-bezier(.22,1,.36,1);
}

.pinPad button{
width:54px;
height:54px;

border:none;
outline:none;

border-radius:50%;

font-family:'clash', sans-serif !important;
font-size:20px;
font-weight:750;

color:white;

background:
linear-gradient(
145deg,
rgba(255,255,255,.22),
rgba(255,255,255,.07)
);

backdrop-filter:
blur(26px)
saturate(190%);

-webkit-backdrop-filter:
blur(26px)
saturate(190%);

border:
1px solid rgba(255,255,255,.18);

box-shadow:
0 10px 28px rgba(0,0,0,.22),
inset 0 1px 1px rgba(255,255,255,.22),
inset 0 -1px 1px rgba(255,255,255,.06);

cursor:pointer;

transition:
transform .18s cubic-bezier(.22,1,.36,1),
background .25s ease,
box-shadow .25s ease;
}

.pinPad button:active{
transform:scale(.86);

background:
linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.12)
);

box-shadow:
0 0 22px rgba(255,150,80,.28),
0 8px 24px rgba(0,0,0,.20),
inset 0 1px 1px rgba(255,255,255,.28);
}

@keyframes pinPadIn{

from{
opacity:0;
transform:
translateX(-50%)
translateY(18px)
scale(.96);
}

to{
opacity:1;
transform:
translateX(-50%)
translateY(0)
scale(1);
}

}

/* HIDE FINGERPRINT WHEN PIN MODE */

.lockscreen.pin-mode .unlock-text{
opacity:0;
pointer-events:none;
}

.lockscreen.pin-mode .fingerprint-wrap{
opacity:0 !important;
pointer-events:none !important;

transform:
translateX(-50%)
scale(.75) !important;

transition:
all .35s cubic-bezier(.22,1,.36,1);
}

@keyframes pinIn{
from{
opacity:0;
transform:translateX(-50%) translateY(14px) scale(.96);
}

to{
opacity:1;
transform:translateX(-50%) translateY(0) scale(1);
}
}

/* =========================
   FAKE FINGERPRINT - GLOW RING
========================= */

.fingerprint-wrap{
position:absolute;
bottom:92px;
left:50%;
transform:translateX(-50%);

width:78px;
height:78px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

z-index:5;
}

.fingerprint-ring{
position:absolute;
inset:0;
border-radius:50%;

background:
linear-gradient(
180deg,
rgba(255,255,255,.16),
rgba(255,255,255,.05)
);

backdrop-filter:
blur(18px)
saturate(180%);
-webkit-backdrop-filter:
blur(18px)
saturate(180%);

border:1px solid rgba(255,255,255,.22);

box-shadow:
0 8px 24px rgba(0,0,0,.24),
inset 0 1px 1px rgba(255,255,255,.20);
}

/* glow halo */
.fingerprint-glow{
position:absolute;
inset:-8px;
border-radius:50%;

background:
radial-gradient(
circle,
rgba(120,190,255,.28) 0%,
rgba(120,190,255,.16) 35%,
rgba(120,190,255,.08) 55%,
rgba(120,190,255,0) 75%
);

opacity:.65;
filter:blur(10px);

pointer-events:none;

transition:
all .35s ease;
}

.fingerprint-icon{
position:relative;
font-size:34px;
font-weight:700;
color:rgba(255,255,255,.95);

text-shadow:
0 0 10px rgba(255,255,255,.15);
}

/* scanning state tanpa garis */
.fingerprint-wrap.scanning .fingerprint-glow{
opacity:1;
transform:scale(1.08);
filter:blur(14px);
animation:fingerPulse .9s ease-in-out infinite;
}

.fingerprint-wrap.scanning .fingerprint-ring{
box-shadow:
0 0 0 2px rgba(255,255,255,.10),
0 0 22px rgba(120,190,255,.30),
0 0 42px rgba(120,190,255,.18),
0 8px 24px rgba(0,0,0,.24),
inset 0 1px 1px rgba(255,255,255,.20);
}

.fingerprint-wrap.scanning .fingerprint-icon{
color:rgba(255,255,255,1);
text-shadow:
0 0 12px rgba(255,255,255,.22),
0 0 24px rgba(120,190,255,.18);
}

@keyframes fingerPulse{
0%{
transform:scale(.96);
opacity:.58;
}
50%{
transform:scale(1.12);
opacity:1;
}
100%{
transform:scale(.96);
opacity:.58;
}
}

/* swipe */
.unlock-text{
position:absolute;

bottom:28px;
left:50%;

transform:translateX(-50%);

font-size:14px;
font-weight:700;

white-space:nowrap;

color:white;
opacity:.88;

text-shadow:
0 8px 24px rgba(0,0,0,.45);

animation:floatUnlock 2s infinite ease-in-out;

z-index:3;
}

@keyframes floatUnlock{
0%{
transform:translateX(-50%) translateY(0);
}

50%{
transform:translateX(-50%) translateY(-8px);
}

100%{
transform:translateX(-50%) translateY(0);
}
}

/* =========================
   WATERFLOW HOME DRAG
========================= */

.home-icon{
will-change:transform, opacity, filter;
transition:
transform .42s cubic-bezier(.16,1,.3,1),
opacity .28s ease,
filter .28s ease;
}

.home-slot{
will-change:transform, background, outline;
transition:
transform .42s cubic-bezier(.16,1,.3,1),
background .28s ease,
outline .28s ease;
}

.home-slot.magnet-active{
background:rgba(255,255,255,.08);
outline:1px dashed rgba(255,255,255,.28);
}

.home-slot.drop-pulse{
animation:dropPulse .55s cubic-bezier(.16,1,.3,1);
}

@keyframes dropPulse{
0%{
transform:scale(1.16);
filter:blur(.4px);
}

55%{
transform:scale(.94);
filter:blur(0);
}

100%{
transform:scale(1);
filter:blur(0);
}
}

.home-floating-icon{
transition:
width .28s cubic-bezier(.16,1,.3,1),
height .28s cubic-bezier(.16,1,.3,1),
border-radius .28s cubic-bezier(.16,1,.3,1),
transform .28s cubic-bezier(.16,1,.3,1),
opacity .22s ease;
}

/* =========================
   CUSTOM HOMESCREEN CLOCK SIZE
========================= */

:root{
--home-clock-size:72px;
}

.clock h1{
font-size:var(--home-clock-size) !important;
transition:font-size .35s cubic-bezier(.16,1,.3,1);
}

/* =========================
   SOFT WATER DROP ANIMATION
========================= */

.home-icon,
.drawer-app,
.home-slot{
transition:
transform .55s cubic-bezier(.16,1,.3,1),
opacity .3s ease,
filter .3s ease,
background .35s ease,
outline .35s ease !important;
}

.home-slot.drop-water{
animation:dropWater .62s cubic-bezier(.16,1,.3,1);
}

@keyframes dropWater{
0%{
transform:scale(1.12);
filter:blur(.5px);
}

45%{
transform:scale(.92);
filter:blur(0);
}

72%{
transform:scale(1.04);
}

100%{
transform:scale(1);
}
}

.home-floating-icon,
.drag-floating-icon{
will-change:left, top, width, height, transform, opacity, filter;
}

/* =========================
   REMOVE APP DUST EFFECT
========================= */

.home-icon.dust-removing{
opacity:0;
transform:scale(.72) translate(22px,-28px) rotate(8deg);
filter:blur(3px);
transition:
opacity .55s ease,
transform .55s cubic-bezier(.16,1,.3,1),
filter .55s ease;
}

.dust-particle{
position:absolute;

width:5px;
height:5px;

border-radius:50%;

background:rgba(255,255,255,.92);

z-index:99999999;

pointer-events:none;

box-shadow:
0 0 10px rgba(255,255,255,.25);

animation:
dustFly .72s cubic-bezier(.16,1,.3,1) forwards;
}

@keyframes dustFly{
0%{
opacity:1;
transform:
translate(0,0)
scale(1);
filter:blur(0);
}

70%{
opacity:.75;
filter:blur(.8px);
}

100%{
opacity:0;
transform:
translate(var(--dx), var(--dy))
scale(.15);
filter:blur(2px);
}
}

/* =========================
   APP DROP POP-IN
========================= */

.home-icon.drop-pop-in{
animation:appDropPop .48s cubic-bezier(.18,1.35,.25,1) both;
}

.home-icon.drop-pop-in img{
animation:appIconPop .48s cubic-bezier(.18,1.35,.25,1) both;
}

@keyframes appDropPop{
0%{
opacity:0;
transform:scale(.18) translateY(10px);
filter:blur(6px);
}

42%{
opacity:1;
transform:scale(1.16) translateY(-3px);
filter:blur(.4px);
}

68%{
transform:scale(.92) translateY(1px);
filter:blur(0);
}

100%{
opacity:1;
transform:scale(1) translateY(0);
filter:blur(0);
}
}

@keyframes appIconPop{
0%{
border-radius:28px;
}

65%{
border-radius:12px;
}

100%{
border-radius:14px;
}
}

.home-floating-icon,
.drag-floating-icon{
transition:none !important;
}

const APPS_PER_PAGE = 24;

let homeAppIds =
JSON.parse(localStorage.getItem("originHomeApps") || "null")
||
[];

let currentPage = 0;
let activeAppId = null;
let activeIconRect = null;

function ensureHomeSlots(minSlots = APPS_PER_PAGE){

while(homeAppIds.length < minSlots){
homeAppIds.push(null);
}

}

function hasHomeApps(){

return homeAppIds.some(appId => appId);

}

function trimHomeApps(){

while(
homeAppIds.length > 0 &&
homeAppIds[homeAppIds.length - 1] === null
){
homeAppIds.pop();
}

}

function getApp(id){
return window.OSApps.find(app => app.id === id);
}

function saveHomeApps(){

trimHomeApps();

localStorage.setItem(
"originHomeApps",
JSON.stringify(homeAppIds)
);

}

document.getElementById("pageDots");

homePages.innerHTML = "";
pageDots.innerHTML = "";

Math.max(homeAppIds.length, APPS_PER_PAGE);

Math.max(
1,
Math.ceil(visibleLength / APPS_PER_PAGE)
);

document.createElement("div");

`translateX(${-currentPage * 100}%)`;

homeAppIds[globalIndex];

getApp(appId);

`
<img src="${app.icon}">

function setupHomeIconEvents(icon, appId, index){

let startX = 0;
let startY = 0;
let isDown = false;
let didDrag = false;
let holdTimer = null;
let editShown = false;

/* DESKTOP */

icon.addEventListener("mousedown",(e)=>{

if(e.button !== 0) return;

e.preventDefault();
e.stopPropagation();

hideHomeDeleteOption();

isDown = true;
didDrag = false;
editShown = false;

startX = e.clientX;
startY = e.clientY;

/* tahan tanpa geser = delete option */
holdTimer =
setTimeout(()=>{

if(isDown && !didDrag){

editShown = true;

showHomeDeleteOption(appId,index,icon);

}

},520);

const moveHandler = (moveEvent)=>{

if(!isDown) return;

const dx =
Math.abs(moveEvent.clientX - startX);

const dy =
Math.abs(moveEvent.clientY - startY);

/* geser = drag reorder */
if((dx > 12 || dy > 12) && !didDrag){

clearTimeout(holdTimer);

hideHomeDeleteOption();

didDrag = true;

startHomeReorder(appId,index,icon,moveEvent);

}

};

const upHandler = ()=>{

clearTimeout(holdTimer);

document.removeEventListener("mousemove",moveHandler);
document.removeEventListener("mouseup",upHandler);

/* klik cepat = buka app */
if(isDown && !didDrag && !editShown){

openOSApp(appId,icon);

}

isDown = false;

};

document.addEventListener("mousemove",moveHandler);
document.addEventListener("mouseup",upHandler);

});

/* MOBILE */

icon.addEventListener("touchstart",(e)=>{

const t =
e.touches[0];

hideHomeDeleteOption();

isDown = true;
didDrag = false;
editShown = false;

startX = t.clientX;
startY = t.clientY;

/* tahan tanpa geser = delete option */
holdTimer =
setTimeout(()=>{

if(isDown && !didDrag){

editShown = true;

showHomeDeleteOption(appId,index,icon);

}

},560);

},{passive:true});

icon.addEventListener("touchmove",(e)=>{

const t =
e.touches[0];

const dx =
Math.abs(t.clientX - startX);

const dy =
Math.abs(t.clientY - startY);

/* geser = drag reorder */
if((dx > 14 || dy > 14) && !didDrag){

clearTimeout(holdTimer);

hideHomeDeleteOption();

didDrag = true;

startHomeReorder(appId,index,icon,t);

}

},{passive:true});

icon.addEventListener("touchend",()=>{

clearTimeout(holdTimer);

/* tap cepat = buka app */
if(isDown && !didDrag && !editShown){

openOSApp(appId,icon);

}

isDown = false;

});

}

document.getElementById("drawerGrid");

if(!drawerGrid) return;

drawerGrid.innerHTML = "";

window.OSApps.forEach(app=>{

document.createElement("div");

`

${already ? `<small class="drawer-added">Home</small>` : ``}

(e)=>{

if(e.shiftKey){

startDrawerDrag(app.id,item,e);
return;

}

closeAppDrawer();

setTimeout(()=>{

openOSApp(app.id,item);

},260);

};

item.onmousedown =
(e)=>{

if(e.shiftKey){

startDrawerDrag(app.id,item,e);

}

};

item.ontouchstart =
(e)=>{

drawerHoldTimer =
setTimeout(()=>{

startDrawerDrag(app.id,item,e.touches[0]);

};

()=>{

clearTimeout(drawerHoldTimer);

};

item.ontouchmove =
()=>{

clearTimeout(drawerHoldTimer);

};

drawerGrid.appendChild(item);

});

}

let drawerHoldTimer = null;
let draggingAppId = null;
let draggingSource = null;
let floatingIcon = null;
let dragStarted = false;
let drawerDropIndex = null;

function startDrawerDrag(appId,item,e){

const app =
getApp(appId);

if(!app) return;

draggingAppId = appId;
draggingSource = item;
dragStarted = true;
drawerDropIndex = null;

ensureHomeSlots();
renderHomePages();

document
.querySelectorAll(".home-page")
.forEach(page=>page.classList.add("reorder-mode"));

document
.querySelectorAll(".home-slot")
.forEach(slot=>slot.classList.add("show-grid"));

const drawer =
document.getElementById("appDrawer");

drawer.classList.add("dragging");

item.classList.add("drag-source");

if(floatingIcon && !skipFloating){
floatingIcon.remove();
}

floatingIcon =
document.createElement("img");

floatingIcon.className =
"drag-floating-icon";

floatingIcon.src =
app.icon;

document
.querySelector(".screen")
.appendChild(floatingIcon);

moveFloatingIcon(e.clientX,e.clientY);

document.addEventListener("mousemove",onDrawerDragMove);
document.addEventListener("mouseup",onDrawerDragEnd);

document.addEventListener("touchmove",onDrawerTouchMove,{passive:false});
document.addEventListener("touchend",onDrawerTouchEnd);

showLiveNotif?.("Drag to Home");

}

function moveFloatingIcon(x,y){

if(!floatingIcon) return;

const screenRect =
document
.querySelector(".screen")
.getBoundingClientRect();

floatingIcon.style.left =
`${x - screenRect.left}px`;

floatingIcon.style.top =
`${y - screenRect.top}px`;

}

function animateFloatingToSlot(floatingEl,slotIndex,done){

const slot =
document.querySelector(
`.home-slot[data-index="${slotIndex}"]`
);

if(slot){
slot.classList.add("drop-water");
}

if(!floatingEl){

done?.();

setTimeout(()=>{

popHomeIconAt(slotIndex);

},30);

return;

}

/* floating icon hilang dulu */
floatingEl.animate([

{
opacity:1,
transform:"translate(-50%,-50%) scale(1.15)",
filter:"blur(0px)"
},

{
opacity:.55,
transform:"translate(-50%,-50%) scale(.72) rotate(5deg)",
filter:"blur(2px)",
offset:.55
},

{
opacity:0,
transform:"translate(-50%,-50%) scale(.22) rotate(10deg)",
filter:"blur(7px)"
}

],{

duration:230,
easing:"cubic-bezier(.16,1,.3,1)",
fill:"forwards"

});

setTimeout(()=>{

if(floatingEl){
floatingEl.remove();
}

if(slot){
slot.classList.remove("drop-water");
}

done?.();

setTimeout(()=>{

popHomeIconAt(slotIndex);

},35);

},220);

}

function popHomeIconAt(index){

const icon =
document.querySelector(
`.home-icon[data-index="${index}"]`
);

if(!icon) return;

icon.classList.remove("drop-pop-in");

void icon.offsetWidth;

icon.classList.add("drop-pop-in");

setTimeout(()=>{

icon.classList.remove("drop-pop-in");

},520);

}

function onDrawerDragMove(e){

if(!dragStarted) return;

moveFloatingIcon(e.clientX,e.clientY);

const phoneRect =
document
.querySelector(".phone")
.getBoundingClientRect();

/* drag ke atas = drawer close otomatis */
if(e.clientY < phoneRect.top + 380){

closeAppDrawer();

}

/* cari slot terdekat */
drawerDropIndex =
getSlotIndexFromPoint(e.clientX,e.clientY);

}
function onDrawerTouchMove(e){

if(!dragStarted) return;

e.preventDefault();

const t =
e.touches[0];

moveFloatingIcon(t.clientX,t.clientY);

const phoneRect =
document
.querySelector(".phone")
.getBoundingClientRect();

if(t.clientY < phoneRect.top + 380){

closeAppDrawer();

}

/* cari slot terdekat */
drawerDropIndex =
getSlotIndexFromPoint(t.clientX,t.clientY);

}

function onDrawerDragEnd(e){

finishDrawerDrag(e.clientX,e.clientY);

}

function onDrawerTouchEnd(e){

const t =
e.changedTouches[0];

finishDrawerDrag(t.clientX,t.clientY);

}

function finishDrawerDrag(x,y){

if(!dragStarted || !draggingAppId) return;

const phoneRect =
document
.querySelector(".phone")
.getBoundingClientRect();

const insidePhone =
x > phoneRect.left &&
x < phoneRect.right &&
y > phoneRect.top &&
y < phoneRect.bottom;

const finalIndex =
drawerDropIndex;

if(
insidePhone &&
finalIndex !== null
){

addAppToHomeAt(
draggingAppId,
finalIndex
);

showLiveNotif?.("Added to Home");

cleanupDrawerDrag(true);

animateFloatingToSlot(
floatingIcon,
finalIndex,
()=>{

if(floatingIcon){

floatingIcon.remove();
floatingIcon = null;

}

renderHomePages();

}
);

return;

}

showLiveNotif?.("Canceled");

cleanupDrawerDrag();

}

function cleanupDrawerDrag(skipFloating = false){

dragStarted = false;

document
.getElementById("appDrawer")
?.classList.remove("dragging");

if(draggingSource){
draggingSource.classList.remove("drag-source");
}

if(floatingIcon && !skipFloating){

floatingIcon.animate([

{
transform:"translate(-50%,-50%) scale(1.15)",
opacity:1
},

{
transform:"translate(-50%,-50%) scale(.3)",
opacity:0
}

],{
duration:260,
easing:"cubic-bezier(.16,1,.3,1)",
fill:"forwards"
});

setTimeout(()=>{

floatingIcon?.remove();
floatingIcon = null;

},250);

}

draggingAppId = null;
draggingSource = null;

document.removeEventListener("mousemove",onDrawerDragMove);
document.removeEventListener("mouseup",onDrawerDragEnd);

document.removeEventListener("touchmove",onDrawerTouchMove);
document.removeEventListener("touchend",onDrawerTouchEnd);

document
.querySelectorAll(".home-page")
.forEach(page=>page.classList.remove("reorder-mode"));

document
.querySelectorAll(".home-slot")
.forEach(slot=>{
slot.classList.remove("show-grid");
slot.classList.remove("drag-target");
slot.classList.remove("magnet-active");
});

drawerDropIndex = null;

renderDrawer();

}

function addAppToHome(appId){

ensureHomeSlots();

const emptyIndex =
homeAppIds.findIndex(slot => slot === null);

if(emptyIndex === -1){

homeAppIds.push(appId);

}else{

homeAppIds[emptyIndex] = appId;

}

saveHomeApps();

renderHomePages();

}

function addAppToHomeAt(appId,index){

ensureHomeSlots(
Math.max(APPS_PER_PAGE, index + 1)
);

/* kalau app udah ada di homescreen, pindahin aja */
const oldIndex =
homeAppIds.indexOf(appId);

if(oldIndex !== -1){
homeAppIds[oldIndex] = null;
}

const target =
homeAppIds[index] || null;

homeAppIds[index] = appId;

/* kalau slot target ada app lain, taruh app itu ke slot kosong pertama */
if(target){

let emptyIndex =
homeAppIds.findIndex(slot => slot === null);

if(emptyIndex === -1){

homeAppIds.push(target);

}else{

homeAppIds[emptyIndex] = target;

}

}

saveHomeApps();

}

function closeAppDrawer(){

document.getElementById("appDrawer");

if(!drawer) return;

drawer.classList.remove("show");

}

function openOSApp(appId,iconEl){

const appData =
getApp(appId);

if(!appData) return;

const appLayer =
document.getElementById("appLayer");

if(!appLayer) return;

appLayer.innerHTML = "";

const appWindow =
document.createElement("div");

appWindow.className = "os-app-window";
appWindow.id = appId;

appWindow.innerHTML =
appData.render();

appLayer.appendChild(appWindow);

activeAppId = appId;

const iconRect =
iconEl.getBoundingClientRect();

activeIconRect = iconRect;

const phoneRect =
document
.querySelector(".phone")
.getBoundingClientRect();

const x =
(iconRect.left + iconRect.width / 2)
-
(phoneRect.left + phoneRect.width / 2);

const y =
(iconRect.top + iconRect.height / 2)
-
(phoneRect.top + phoneRect.height / 2);

appWindow.style.display = "block";

appWindow.animate([

{
transform:
`translate(${x}px,${y}px) scale(.04) rotate(-6deg)`,
opacity:0,
borderRadius:"60px",
filter:"blur(30px)"
},

{
transform:
"translate(0,0) scale(1) rotate(0deg)",
opacity:1,
borderRadius:"0px",
filter:"blur(0px)"
}

],{

duration:780,
easing:"cubic-bezier(.22,1,.36,1)",
fill:"forwards"

});

activateIsland?.();

setIslandText?.("● " + appData.name,"");

setTimeout(()=>{

appData.init?.();

},120);

}

function closeCurrentApp(){

/* =========================
   HOME REORDER SYSTEM
========================= */

let homeDragging = false;
let homeDragIndex = null;
let homeDragIcon = null;
let homeFloatingIcon = null;
let pendingDropIndex = null;

function startHomeReorder(appId,index,iconEl,e){

const app =
getApp(appId);

if(!app) return;

homeDragging = true;
homeDragIndex = index;
homeDragIcon = iconEl;
pendingDropIndex = index;

iconEl.classList.add("dragging-home");

document
.querySelectorAll(".home-page")
.forEach(page=>page.classList.add("reorder-mode"));

document
.querySelectorAll(".home-slot")
.forEach(slot=>slot.classList.add("show-grid"));

homeFloatingIcon =
document.createElement("img");

homeFloatingIcon.className =
"home-floating-icon";

homeFloatingIcon.src =
app.icon;

document
.querySelector(".screen")
.appendChild(homeFloatingIcon);

moveHomeFloatingIcon(e.clientX,e.clientY);

document.addEventListener("mousemove",onHomeDragMove);
document.addEventListener("mouseup",onHomeDragEnd);

document.addEventListener("touchmove",onHomeTouchMove,{passive:false});
document.addEventListener("touchend",onHomeTouchEnd);

showLiveNotif?.("Move App");

}

function moveHomeFloatingIcon(x,y){

if(!homeFloatingIcon) return;

const screenRect =
document
.querySelector(".screen")
.getBoundingClientRect();

homeFloatingIcon.style.left =
`${x - screenRect.left}px`;

homeFloatingIcon.style.top =
`${y - screenRect.top}px`;

}

function getSlotIndexFromPoint(x,y){

const slots =
Array.from(
document.querySelectorAll(".home-slot")
);

let closest = null;
let closestDistance = Infinity;

slots.forEach(slot=>{

const rect =
slot.getBoundingClientRect();

const cx =
rect.left + rect.width / 2;

const cy =
rect.top + rect.height / 2;

const distance =
Math.hypot(x - cx, y - cy);

if(distance < closestDistance){

closestDistance = distance;
closest = slot;

}

});

document
.querySelectorAll(".home-slot")
.forEach(slot=>slot.classList.remove("drag-target"));

if(closest){

closest.classList.add("drag-target");

return Number(closest.dataset.index);

}

return homeDragIndex;

}

function liveReorderPreview(targetIndex){

if(targetIndex === null) return;

pendingDropIndex = targetIndex;

const floating =
homeFloatingIcon;

if(!floating) return;

const floatRect =
floating.getBoundingClientRect();

const fx =
floatRect.left + floatRect.width / 2;

const fy =
floatRect.top + floatRect.height / 2;

const slots =
Array.from(
document.querySelectorAll(".home-slot")
);

slots.forEach(slot=>{

slot.classList.remove("magnet-active");

const icon =
slot.querySelector(".home-icon");

if(!icon) return;

icon.style.transform = "";

const idx =
Number(icon.dataset.index);

if(idx === homeDragIndex) return;

const rect =
slot.getBoundingClientRect();

const cx =
rect.left + rect.width / 2;

const cy =
rect.top + rect.height / 2;

const dx =
cx - fx;

const dy =
cy - fy;

const distance =
Math.max(
Math.hypot(dx,dy),
1
);

/* radius magnet */
const radius = 115;

if(distance < radius){

const force =
(1 - distance / radius);

/* arah menjauh dari icon yang lagi di-drag */
const pushX =
(dx / distance) * force * 22;

const pushY =
(dy / distance) * force * 22;

const scale =
1 - force * .08;

icon.style.transform =
`translate(${pushX}px, ${pushY}px) scale(${scale})`;

slot.classList.add("magnet-active");

}

});

}

function onHomeDragMove(e){

if(!homeDragging) return;

moveHomeFloatingIcon(e.clientX,e.clientY);

const target =
getSlotIndexFromPoint(e.clientX,e.clientY);

liveReorderPreview(target);

}

function onHomeTouchMove(e){

if(!homeDragging) return;

e.preventDefault();

const t =
e.touches[0];

moveHomeFloatingIcon(t.clientX,t.clientY);

const target =
getSlotIndexFromPoint(t.clientX,t.clientY);

liveReorderPreview(target);

}

function onHomeDragEnd(){

finishHomeReorder();

}

function onHomeTouchEnd(){

finishHomeReorder();

}

function finishHomeReorder(){

if(!homeDragging) return;

const finalIndex =
pendingDropIndex;

if(
finalIndex !== null &&
finalIndex !== homeDragIndex
){

ensureHomeSlots(
Math.max(APPS_PER_PAGE, finalIndex + 1)
);

const moved =
homeAppIds[homeDragIndex];

const target =
homeAppIds[finalIndex] || null;

homeAppIds[finalIndex] = moved;
homeAppIds[homeDragIndex] = target;

saveHomeApps();

animateFloatingToSlot(
homeFloatingIcon,
finalIndex,
()=>{

cleanupHomeReorder(true);

if(homeFloatingIcon){

homeFloatingIcon.remove();
homeFloatingIcon = null;

}

renderHomePages();

}
);

return;

}

cleanupHomeReorder();
renderHomePages();

}
function cleanupHomeReorder(skipFloating = false){

homeDragging = false;

if(homeDragIcon){
homeDragIcon.classList.remove("dragging-home");
}

document
.querySelectorAll(".home-page")
.forEach(page=>page.classList.remove("reorder-mode"));

document
.querySelectorAll(".home-slot")
.forEach(slot=>{
slot.classList.remove("show-grid");
slot.classList.remove("drag-target");
slot.classList.remove("magnet-active");
slot.classList.remove("drop-water");
slot.style.transform = "";
});

document
.querySelectorAll(".home-icon")
.forEach(icon=>{
icon.style.transform = "";
});

if(homeFloatingIcon && !skipFloating){

homeFloatingIcon.animate([

{
opacity:1,
transform:"translate(-50%,-50%) scale(1.18)"
},

{
opacity:0,
transform:"translate(-50%,-50%) scale(.45)"
}

],{
duration:220,
easing:"cubic-bezier(.16,1,.3,1)",
fill:"forwards"
});

setTimeout(()=>{

homeFloatingIcon?.remove();
homeFloatingIcon = null;

},210);

}

homeDragIndex = null;
homeDragIcon = null;
pendingDropIndex = null;

document.removeEventListener("mousemove",onHomeDragMove);
document.removeEventListener("mouseup",onHomeDragEnd);

document.removeEventListener("touchmove",onHomeTouchMove);
document.removeEventListener("touchend",onHomeTouchEnd);

}

if(!lockscreen || !pinInput || !unlockText) return;

lockPhase = 1;

lockscreen.classList.add("pin-mode");

unlockText.innerText =
"Enter PIN, then press Enter";

pinInput.style.display = "block";
pinInput.focus();

}

/* unlock final */
function unlockPhone(){

const lockscreen =
document.getElementById("lockscreen");

if(!lockscreen) return;

lockscreen.classList.add("hide");

setTimeout(()=>{

lockscreen.style.display = "none";

document
.querySelector(".screen")
?.classList.add("home-ready");

},700);

showLiveNotif?.("Unlocked");

}

/* lock / tombol power */
function lockPhone(){

if(!lockscreen || !pinInput || !unlockText) return;

document
.querySelector(".screen")
.classList.remove("home-ready");

lockscreen.style.display = "block";

setTimeout(()=>{

lockscreen.classList.remove("hide");
lockscreen.classList.remove("pin-mode");

},20);

pinInput.value = "";
pinInput.style.display = "none";

unlockText.innerText =
"Tap fingerprint or swipe up";

lockPhase = 0;

const fp =
document.getElementById("fingerprintWrap");

if(fp){
fp.style.opacity = "1";
fp.style.pointerEvents = "auto";
fp.style.transform = "translateX(-50%) scale(1)";
}

}

/* custom PIN */
function setCustomPin(newPin){

if(!newPin || newPin.length < 4){

showLiveNotif?.("PIN minimal 4 digit");
return;

}

customPin = newPin;

localStorage.setItem(
"originCustomPin",

);

document.getElementById("pinInput");

if(!input) return;

const savedPin =
localStorage.getItem("originCustomPin") || "123456";

if(input.value === savedPin){

unlockPhone();

}else{

navigator.vibrate?.(100);

}

}

/* =========================
   UNIVERSAL INPUT SAFE
========================= */

let inputStartX = 0;
let inputStartY = 0;
let inputDown = false;

function handleGestureEnd(endX,endY){

const dx =
inputStartX - endX;

const dy =
inputStartY - endY;

const phoneEl =
document.querySelector(".phone");

if(!phoneEl) return;

const rect =
phoneEl.getBoundingClientRect();

/* LOCKSCREEN: swipe up = PIN */

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.style.display !== "none" &&
!lockscreen.classList.contains("hide") &&
inputStartY > rect.bottom - 190 &&
dy > 70
){

enterPinMode?.();
return;

}

/* APP: swipe up from bottom = home */

if(
typeof activeAppId !== "undefined" &&
activeAppId &&
inputStartY > rect.bottom - 120 &&
dy > 60
){

closeCurrentApp?.();
return;

}

/* HOME: swipe up = app drawer */

if(
typeof activeAppId !== "undefined" &&
!activeAppId &&
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("hide") &&
inputStartY > rect.bottom - 150 &&
dy > 70
){

openAppDrawer?.();
return;

}

/* CONTROL CENTER: pull down from top right */

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("hide") &&
inputStartY < rect.top + 90 &&
inputStartX > rect.right - 125 &&
dy < -45
){

document
.getElementById("controlCenter")
?.classList.add("show");

return;

}

/* CLOSE CONTROL CENTER */

if(dy > 60){

document
.getElementById("controlCenter")
?.classList.remove("show");

}

/* PAGE SWIPE LEFT / RIGHT */

if(
typeof currentPage !== "undefined" &&
typeof homeAppIds !== "undefined" &&
typeof APPS_PER_PAGE !== "undefined" &&
typeof activeAppId !== "undefined" &&
!activeAppId &&
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("hide") &&
Math.abs(dx) > 55
){

const pageCount =
Math.ceil(homeAppIds.length / APPS_PER_PAGE);

if(dx > 0 && currentPage < pageCount - 1){

currentPage++;

}

if(dx < 0 && currentPage > 0){

currentPage--;

}

renderHomePages?.();

}

}

const phoneEl =
document.querySelector(".phone");

/* TOUCH */

phoneEl?.addEventListener("touchstart",(e)=>{

inputStartX =
e.touches[0].clientX;

inputStartY =
e.touches[0].clientY;

});

phoneEl?.addEventListener("touchend",(e)=>{

handleGestureEnd(
e.changedTouches[0].clientX,
e.changedTouches[0].clientY
);

});

/* MOUSE */

phoneEl?.addEventListener("mousedown",(e)=>{

inputDown = true;

inputStartX =
e.clientX;

inputStartY =
e.clientY;

});

phoneEl?.addEventListener("mouseup",(e)=>{

if(!inputDown) return;

inputDown = false;

handleGestureEnd(
e.clientX,
e.clientY
);

});

/* KEYBOARD */

document.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("pin-mode")
){

checkPin?.();
return;

}

}

if(e.key === "Escape"){

const drawer =
document.getElementById("appDrawer");

const cc =
document.getElementById("controlCenter");

if(drawer?.classList.contains("show")){

closeAppDrawer?.();
return;

}

if(cc?.classList.contains("show")){

cc.classList.remove("show");
return;

}

if(
typeof activeAppId !== "undefined" &&
activeAppId
){

closeCurrentApp?.();
return;

}

}

if(e.key === "ArrowUp"){

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.style.display !== "none" &&
!lockscreen.classList.contains("hide")
){

enterPinMode?.();
return;

}

if(
typeof activeAppId !== "undefined" &&
activeAppId
){

closeCurrentApp?.();
return;

}

openAppDrawer?.();

}

if(e.key === "ArrowDown"){

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("hide")
){

document
.getElementById("controlCenter")
?.classList.add("show");

}

}

if(
e.key === "ArrowRight" &&
typeof currentPage !== "undefined" &&
typeof homeAppIds !== "undefined" &&
typeof APPS_PER_PAGE !== "undefined" &&
typeof activeAppId !== "undefined" &&
!activeAppId
){

const pageCount =
Math.ceil(homeAppIds.length / APPS_PER_PAGE);

if(currentPage < pageCount - 1){

currentPage++;
renderHomePages?.();

}

}

if(
e.key === "LeftArrow" &&
typeof currentPage !== "undefined" &&
typeof activeAppId !== "undefined" &&
!activeAppId
){

if(currentPage > 0){

currentPage--;
renderHomePages?.();

}

}

if(
typeof lockscreen !== "undefined" &&
lockscreen &&
lockscreen.classList.contains("pin-mode")
){

if(/^[0-9]$/.test(e.key)){

pressPin?.(e.key);
return;

}

if(e.key === "Backspace"){

clearPin?.();
return;

}

}

});

/* =========================
   FACTORY RESET PHONE
========================= */

function factoryResetPhone(){

const ok =
confirm(
"Reset virtual phone to factory settings?\nThis will clear home apps, songs, settings, PIN, and saved data."
);

if(!ok) return;

/* Core system */
localStorage.removeItem("originHomeApps");
localStorage.removeItem("originTutorialDone");
localStorage.removeItem("originCustomPin");
localStorage.removeItem("originWallpaper");
localStorage.removeItem("originDockApps");
localStorage.removeItem("originRecentApps");
localStorage.removeItem("originHomeClockSize");

/* Music app */
localStorage.removeItem("originCustomSongs");

/* Settings app */
localStorage.removeItem("wannuiSettingsLogged");
localStorage.removeItem("wannuiSettingsUsername");
localStorage.removeItem("wannuiAboutPhone");

/* Future app data, kalau nanti lu tambah */
Object.keys(localStorage).forEach(key=>{

if(
key.startsWith("wannui") ||
key.startsWith("origin")
){

localStorage.removeItem(key);

}

});

showLiveNotif?.("Factory Reset");

setTimeout(()=>{

location.reload();

},500);

}
